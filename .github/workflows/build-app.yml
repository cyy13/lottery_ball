name: 打包抽奖程序（Windows/macOS）

on:
  push:
    branches: [ main ]  # 推送到main分支时触发
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # 手动触发

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]  # 同时打包Windows和macOS

    runs-on: ${{ matrix.os }}

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'  # 推荐3.10（兼容pygame和PyInstaller）

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 打包（Windows）
        if: matrix.os == 'windows-latest'
        run: |
          pyinstaller --onedir --windowed --name "崇道堂幸运抽奖" ^
          --add-data "myfont.ttf;." ^
          --add-data "bgm.mp3;." ^
          --add-data "名单.txt;." ^
          --clean ^
          lottery_ball.py
        shell: cmd

      - name: 打包（macOS）
        if: matrix.os == 'macos-latest'
        run: |
          pyinstaller --onedir --windowed --name "崇道堂幸运抽奖" \
          --add-data "myfont.ttf:." \
          --add-data "bgm.mp3:." \
          --add-data "名单.txt:." \
          --clean \
          --disable-windowed-traceback \
          lottery_ball.py

      - name: 上传打包产物
        uses: actions/upload-artifact@v4
        with:
          name: 抽奖程序_${{ matrix.os }}
          path: |
            dist/*
